        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }

</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- アイコンコンポーネント ---
        const Icon = ({ size=24, color="currentColor", className="", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Sword = (p) => <Icon {...p}><polyline points="14.5 17.5 3 6 3 3 6 3 17.5 14.5" /><line x1="13" y1="19" x2="19" y2="13" /><line x1="16" y1="16" x2="20" y2="20" /><line x1="19" y1="21" x2="21" y2="19" /></Icon>;
        const Book = (p) => <Icon {...p}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20" /></Icon>;
        const Shield = (p) => <Icon {...p}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.5 3.8 17 5 19 5a1 1 0 0 1 1 1z" /></Icon>;
        const Wand2 = (p) => <Icon {...p}><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></Icon>;
        const Crosshair = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><line x1="22" y1="12" x2="18" y2="12"/><line x1="6" y1="12" x2="2" y2="12"/><line x1="12" y1="6" x2="12" y2="2"/><line x1="12" y1="22" x2="12" y2="18"/></Icon>;
        const Crown = (p) => <Icon {...p}><path d="m2 4 3 12h14l3-12-6 7-4-7-4 7-6-7zm3 16h14"/></Icon>;
        const Hexagon = (p) => <Icon {...p}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></Icon>;
        const Ghost = (p) => <Icon {...p}><path d="M9 10h.01"/><path d="M15 10h.01"/><path d="M12 2a8 8 0 0 0-8 8v12l3-3 2.5 2.5L12 19l2.5 2.5L17 19l3 3V10a8 8 0 0 0-8-8z"/></Icon>;
        const Zap = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></Icon>;
        const Star = (p) => <Icon {...p}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
        const Flame = (p) => <Icon {...p}><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/></Icon>;
        const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></Icon>;
        const Cpu = (p) => <Icon {...p}><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></Icon>;
        const Moon = (p) => <Icon {...p}><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></Icon>;
        const Bomb = (p) => <Icon {...p}><circle cx="11" cy="13" r="8"/><path d="M5 9 2 6"/><path d="m15 9 3-3"/><path d="M11 5V2"/><line x1="11" y1="2" x2="13" y2="4"/></Icon>;

        // --- レアリティ定義 ---
        const BASE_RARITIES = [
          { id: 'N', phase: 1, name: 'Normal', weight: 4000, colors: ['#9ca3af', '#f3f4f6'], bgClass: 'bg-gradient-to-br from-gray-600 to-gray-400', textClass: 'text-gray-300' },
          { id: 'R', phase: 2, name: 'Rare', weight: 3000, colors: ['#3b82f6', '#93c5fd'], bgClass: 'bg-gradient-to-br from-blue-700 to-blue-400', textClass: 'text-blue-400' },
          { id: 'SR', phase: 3, name: 'Super Rare', weight: 2000, colors: ['#a855f7', '#d8b4fe'], bgClass: 'bg-gradient-to-br from-purple-700 to-purple-400', textClass: 'text-purple-400' },
          { id: 'SSR', phase: 4, name: 'Double Super Rare', weight: 700, colors: ['#eab308', '#fef08a'], bgClass: 'bg-gradient-to-br from-yellow-600 to-yellow-300', textClass: 'text-yellow-300' },
          { id: 'HR', phase: 5, name: 'Hyper Rare', weight: 200, colors: ['#10b981', '#6ee7b7', '#059669'], bgClass: 'bg-gradient-to-br from-emerald-600 to-teal-400', textClass: 'text-emerald-300' },
          { id: 'UR', phase: 6, name: 'Ultra Rare', weight: 80, colors: ['#ef4444', '#fca5a5', '#ea580c'], bgClass: 'bg-gradient-to-br from-red-700 via-rose-600 to-orange-600', textClass: 'text-red-400' },
          { id: 'Z', phase: 7, name: 'ZENITH', weight: 15, colors: ['#ff0000', '#00ff00', '#0000ff'], bgClass: 'bg-z-card', textClass: 'text-z-rare' },
        ];
        const ZZR_RARITY = { id: 'ZZR', phase: 8, name: 'Zeta Zenith Rare', weight: 5, colors: ['#ffffff', '#8888ff'], bgClass: 'bg-zzr-card', textClass: 'text-zzr-rare' };

        // --- ガチャデータ定義 ---
        const BANNERS = [
          {
            id: 'fantasy', name: '幻想の武具', bgClass: 'bg-[#0a0a0f]', titleGradient: 'from-gray-100 to-gray-500', rarities: BASE_RARITIES,
            data: {
              prefixes: ["真・", "封印されし", "古の", "聖なる", "暗黒の", "星屑の", "次元を裂く", "幻影の", "輝かしき", "呪われた"],
              bases: ["剣", "魔導書", "指輪", "鎧", "盾", "杖", "槍", "弓", "短剣", "王冠", "水晶", "魂", "ネックレス"],
              suffixes: ["・オメガ", "の残滓", "・レプリカ", "の極み", "・改", "（呪）", "の断片", "・オリジン"],
              urNames: ["神滅の剣", "魔王の心臓", "星砕きの戦斧", "次元を超える指輪", "不老不死 of 霊薬", "世界樹の雫", "絶対零度の槍"],
              zNames: ["真理の扉", "創世の光・ジェネシス", "終焉のノヴァ", "アカシックレコード", "絶対神の遺物", "宇宙の産声"],
              zzrNames: []
            }
          },
          {
            id: 'scifi', name: '電脳の遺産', bgClass: 'bg-[#051122]', titleGradient: 'from-cyan-300 to-blue-600', rarities: BASE_RARITIES,
            data: {
              prefixes: ["量子", "超次元", "プラズマ", "ナノ", "サイバー", "光学", "反物質", "虚数", "ネオン", "クロム"],
              bases: ["ブレード", "ブラスター", "シールド", "コア", "ドライブ", "スーツ", "バイザー", "ギア", "モジュール", "カノン"],
              suffixes: ["・Mk-II", "・プロトタイプ", "・オーバードライブ", " v2.0", "・カスタム", "・インフィニティ"],
              urNames: ["タキオン・スプリッター", "ブラックホール・エンジン", "特異点ジェネレーター", "絶対防壁イージス", "事象の地平線"],
              zNames: ["アカシック・メインフレーム", "コズミック・ストリング", "創世AI・アルファ", "次元崩壊砲・オメガ", "神の領域(ゴッド・セクター)"],
              zzrNames: []
            }
          },
          {
            id: 'celestial', name: '星界の神託', bgClass: 'bg-[#0b041a]', titleGradient: 'from-purple-300 via-pink-300 to-indigo-400', rarities: [...BASE_RARITIES, ZZR_RARITY],
            data: {
              prefixes: ["星霊の", "銀河の", "神聖なる", "天界の", "宇宙の", "真理の", "悠久の", "アストラル", "流星の", "月光の"],
              bases: ["杖", "オーブ", "法衣", "ティアラ", "ハープ", "聖杯", "神剣", "翼", "羅針盤", "天球儀"],
              suffixes: ["・ルミナス", "・エターナル", "の加護", "・ノヴァ", "の奇跡", "・コスモス"],
              urNames: ["創造神の息吹", "天上のシンフォニー", "星巡りの大鎌", "銀河を統べる王冠"],
              zNames: ["ビッグバン・コア", "神の玉座", "全知全能の書"],
              zzrNames: ["Ω・ジ・エンド", "絶対神・アルティメット", "宇宙創世の理(コズミック・ロゴス)"]
            }
          },
          {
            id: 'secret', name: '終末のトリガー', bgClass: 'bg-[#0f0404]', titleGradient: 'from-red-600 via-orange-500 to-yellow-500', rarities: BASE_RARITIES, isSecret: true,
            data: {
              prefixes: ["滅殺の", "サプレッサー・", "デス・", "ドゥーム・", "ライオット・", "リベレーター・", "ヴェノム・", "ゴースト・", "ヘル・"],
              bases: ["ハンドガン", "ショットガン", "アサルトライフル", "ランチャー", "キャノン", "マシンガン", "スナイパー", "ガトリング"],
              suffixes: ["・コラプス", "・カタストロフィ", "・ブラスト", "・ブラッドエッジ", "・カスタムXS"],
              urNames: ["終末の魔弾・トリニティ", "ヘカトンケイル・レールガン", "超新星爆縮ランチャー"],
              zNames: ["ガグンラーズ・ゼロ", "滅世機関・デスゲート"],
              zzrNames: []
            }
          }
        ];

        function generateItemName(rarityId, bannerData) {
            if (rarityId === 'ZZR') return bannerData.zzrNames[Math.floor(Math.random() * bannerData.zzrNames.length)];
            if (rarityId === 'Z') return bannerData.zNames[Math.floor(Math.random() * bannerData.zNames.length)];
            if (rarityId === 'UR') return bannerData.urNames[Math.floor(Math.random() * bannerData.urNames.length)];
            const p = bannerData.prefixes[Math.floor(Math.random() * bannerData.prefixes.length)];
            const b = bannerData.bases[Math.floor(Math.random() * bannerData.bases.length)];
            let s = "";
            if (rarityId === 'SSR' || rarityId === 'HR' || Math.random() > 0.7) s = bannerData.suffixes[Math.floor(Math.random() * bannerData.suffixes.length)];
            return `${p}${b}${s}`;
        }

        function getIconForName(name) {
            if (name.includes("剣") || name.includes("短剣") || name.includes("戦斧") || name.includes("ブレード")) return Sword;
            if (name.includes("魔導書") || name.includes("レコード") || name.includes("書")) return Book;
            if (name.includes("盾") || name.includes("鎧") || name.includes("シールド") || name.includes("イージス") || name.includes("法衣")) return Shield;
            if (name.includes("杖") || name.includes("槍")) return Wand2;
            if (name.includes("弓") || name.includes("ブラスター") || name.includes("カノン") || name.includes("ガン") || name.includes("ライフル") || name.includes("ランチャー") || name.includes("ガトリング")) return Crosshair;
            if (name.includes("王冠") || name.includes("ティアラ")) return Crown;
            if (name.includes("指輪") || name.includes("扉") || name.includes("ギア") || name.includes("羅針盤")) return Hexagon;
            if (name.includes("魂") || name.includes("心臓") || name.includes("霊薬") || name.includes("聖杯") || name.includes("息吹")) return Ghost;
            if (name.includes("水晶") || name.includes("雫") || name.includes("ノヴァ") || name.includes("遺物") || name.includes("オーブ") || name.includes("奇跡")) return Sparkles;
            if (name.includes("ガントレット") || name.includes("炎") || name.includes("産声")) return Flame;
            if (name.includes("光") || name.includes("星") || name.includes("ゼロ") || name.includes("プラズマ") || name.includes("ネオン") || name.includes("銀河") || name.includes("天球儀")) return Zap;
            if (name.includes("月光") || name.includes("宇宙") || name.includes("神")) return Moon;
            if (name.includes("コア") || name.includes("ドライブ") || name.includes("メインフレーム") || name.includes("理")) return Cpu;
            if (name.includes("トリガー") || name.includes("滅世") || name.includes("ボム")) return Bomb;
            return Star;
        }

        // --- パーティクルシステム ---
        class ParticleSystem {
            constructor(canvas, theme = 'fantasy') {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.particles = [];
                this.bgParticles = [];
                this.state = 'idle'; 
                this.currentPhaseNum = 1;
                this.targetColors = [];
                this.shake = 0;
                this.theme = theme;
                this.warpSpeed = 1;
                this.singularityPower = 0; // 特異点吸い込み用
                this.initBg();
            }
            
            setTheme(theme) {
                this.theme = theme;
                this.initBg();
            }

            resize(w, h) {
                this.canvas.width = w;
                this.canvas.height = h;
            }

            initBg() {
                this.bgParticles = [];
                const count = this.theme === 'secret' ? 180 : 150;
                for(let i=0; i<count; i++) {
                    let vx, vy;
                    if (this.theme === 'scifi') {
                        const isVertical = Math.random() > 0.5;
                        vx = isVertical ? 0 : (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 1.5 + 0.5);
                        vy = isVertical ? (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 1.5 + 0.5) : 0;
                    } else if (this.theme === 'celestial') {
                        vx = (Math.random() - 0.5) * 1.5;
                        vy = (Math.random() - 0.5) * 1.5;
                    } else if (this.theme === 'secret') {
                        // 赤黒い火の粉が下から上へ昇る
                        vx = (Math.random() - 0.5) * 0.8;
                        vy = -Math.random() * 1.2 - 0.4;
                    } else {
                        vx = (Math.random() - 0.5) * 0.5;
                        vy = (Math.random() - 0.5) * 0.5;
                    }
                    this.bgParticles.push({
                        x: Math.random() * window.innerWidth,
                        y: Math.random() * window.innerHeight,
                        vx, vy,
                        size: Math.random() * (this.theme === 'celestial' ? 3 : 2) + 0.5,
                        alpha: Math.random() * 0.5 + 0.1,
                        color: this.theme === 'celestial' ? (Math.random()>0.8?'#fef08a':'#ffffff') : (this.theme === 'secret' ? `rgba(${200 + Math.random()*55}, ${Math.random()*80}, 0, ${Math.random()*0.4+0.1})` : '#ffffff')
                    });
                }
            }

            getRandomColor() {
                if (!this.targetColors || this.targetColors.length === 0) return '#ffffff';
                return this.targetColors[Math.floor(Math.random() * this.targetColors.length)];
            }

            setChargeState(phaseNum, colors) {
                this.state = 'charging';
                this.currentPhaseNum = phaseNum;
                this.targetColors = colors;
                this.shake = phaseNum * 10; 
                this.warpSpeed = 1;
                this.singularityPower = 0;
            }

            startExplosion(colors, isZ, isUR, isZZR) {
                this.state = 'result';
                this.targetColors = colors;
                this.particles = [];
                this.shake = isZZR ? 120 : (isZ ? 80 : (isUR ? 40 : 15));
                
                const cx = this.canvas.width / 2;
                const cy = this.canvas.height / 2;
                const particleCount = isZZR ? 1200 : (isZ ? 800 : (isUR ? 500 : 300));

                for (let i = 0; i < particleCount; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * (isZZR ? 60 : (isZ ? 40 : 20)) + 2;
                    this.particles.push({
                        x: cx, y: cy, lastX: cx, lastY: cy,
                        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        size: Math.random() * (isZZR ? 9 : (isZ ? 7 : 5)) + 1,
                        color: isZZR ? (Math.random()>0.5?'#fff':'#88f') : this.getRandomColor(), type: 'explode', life: 1, decay: Math.random() * 0.02 + 0.005,
                        shape: this.theme === 'scifi' ? (Math.random() > 0.7 ? 'rect' : 'line') : 'line'
                    });
                }

                for (let i = 0; i < 200; i++) {
                    const angle = (i / 200) * Math.PI * 2;
                    const speed = isZZR ? 65 : (isZ ? 45 : 28);
                    this.particles.push({
                        x: cx, y: cy, lastX: cx, lastY: cy,
                        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        size: 3, color: '#ffffff', type: 'shockwave', life: 1, decay: 0.03, shape: 'line'
                    });
                }
            }

            startShotgunExplosion() {
                this.state = 'result';
                this.particles = [];
                this.shake = 130;
                
                const cx = this.canvas.width / 2;
                const cy = this.canvas.height / 2;

                // 散弾（極太の火花光線）
                for (let i = 0; i < 400; i++) {
                    const angle = (Math.random() - 0.5) * (Math.PI / 1.5) - Math.PI / 2; // 上方向・広角に噴射
                    const speed = Math.random() * 50 + 15;
                    this.particles.push({
                        x: cx, y: cy + 100, lastX: cx, lastY: cy + 100,
                        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
                        size: Math.random() * 6 + 2,
                        color: Math.random() > 0.4 ? `rgba(255, ${100 + Math.random()*155}, 0, 1)` : '#fff',
                        type: 'explode', life: 1, decay: Math.random() * 0.04 + 0.01,
                        shape: 'line'
                    });
                }

                // 薬莢（真鍮色）が横に飛び散る
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 0.4 - Math.PI * 0.2; // 左右斜め下
                    const speed = Math.random() * 15 + 5;
                    this.particles.push({
                        x: cx, y: cy + 50, lastX: cx, lastY: cy + 50,
                        vx: (Math.random() > 0.5 ? 1 : -1) * Math.cos(angle) * speed,
                        vy: -Math.random() * 8,
                        size: 4, color: '#eab308', type: 'shell', life: 1.5, decay: 0.02
                    });
                }
            }

            update() {
                const w = this.canvas.width;
                const h = this.canvas.height;
                const cx = w / 2;
                const cy = h / 2;

                this.ctx.fillStyle = 'rgba(10, 10, 15, 0.25)';
                this.ctx.fillRect(0, 0, w, h);

                this.ctx.save();
                
                let currentShake = this.shake;
                if (this.state === 'charging' && this.currentPhaseNum >= 2) currentShake += (this.currentPhaseNum - 1) * 3;
                
                if (currentShake > 0) {
                    this.ctx.translate((Math.random()-0.5)*currentShake, (Math.random()-0.5)*currentShake);
                    this.shake *= 0.9;
                    if(this.shake < 0.5) this.shake = 0;
                }

                this.ctx.globalCompositeOperation = 'lighter';

                // 背景パーティクル
                this.bgParticles.forEach(p => {
                    let speedMult = 1;
                    if (this.state === 'charging') speedMult = 1 + (this.currentPhaseNum * 0.8);
                    if (this.state === 'warp') speedMult = this.warpSpeed; 

                    if (this.state === 'singularity') {
                        // 特異点へ強烈に吸い込まれる
                        const dx = cx - p.x;
                        const dy = cy - p.y;
                        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                        if (dist > 10) {
                            p.x += (dx/dist) * this.singularityPower * 5;
                            p.y += (dy/dist) * this.singularityPower * 5;
                        } else {
                            p.x = Math.random() * w;
                            p.y = Math.random() * h;
                        }
                    } else if (this.state === 'warp') {
                        const dx = p.x - cx;
                        const dy = p.y - cy;
                        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
                        p.x += (dx/dist) * speedMult * 10;
                        p.y += (dy/dist) * speedMult * 10;
                    } else {
                        p.x += p.vx * speedMult;
                        p.y += p.vy * speedMult;
                    }
                    
                    if(p.x < 0) p.x = w; if(p.x > w) p.x = 0;
                    if(p.y < 0) p.y = h; if(p.y > h) p.y = 0;
                    
                    if (this.theme === 'scifi') {
                        this.ctx.fillStyle = `rgba(103, 243, 209, ${p.alpha * 0.6})`;
                        this.ctx.fillRect(p.x, p.y, p.size * (Math.abs(p.vx) > 0 ? 6 : 1), p.size * (Math.abs(p.vy) > 0 ? 6 : 1));
                    } else {
                        this.ctx.fillStyle = p.color || `rgba(255, 255, 255, ${p.alpha})`;
                        this.ctx.beginPath();
                        this.ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                        this.ctx.fill();
                    }
                });

                if (this.state === 'singularity') {
                    // 特異点（ブラックホールコア）
                    const grad = this.ctx.createRadialGradient(cx, cy, 0, cx, cy, 100);
                    grad.addColorStop(0, '#000000');
                    grad.addColorStop(0.3, '#0f0426');
                    grad.addColorStop(0.8, '#a855f7');
                    grad.addColorStop(1, 'transparent');
                    this.ctx.fillStyle = grad;
                    this.ctx.beginPath();
                    this.ctx.arc(cx, cy, 150, 0, Math.PI*2);
                    this.ctx.fill();
                    
                    // 重力ひずみのリング
                    this.ctx.strokeStyle = '#c084fc';
                    this.ctx.lineWidth = 1;
                    this.ctx.beginPath();
                    this.ctx.arc(cx, cy, 60 + Math.sin(Date.now()/50)*10, 0, Math.PI*2);
                    this.ctx.stroke();
                }

                if (this.state === 'crack') {
                    this.ctx.strokeStyle = '#ffffff';
                    this.ctx.lineWidth = 4;
                    this.ctx.beginPath();
                    this.ctx.moveTo(w*0.2, -50);
                    this.ctx.lineTo(w*0.4, h*0.3);
                    this.ctx.lineTo(w*0.3, h*0.6);
                    this.ctx.lineTo(w*0.7, h + 50);
                    this.ctx.stroke();
                    this.ctx.lineWidth = 2;
                    this.ctx.beginPath();
                    this.ctx.moveTo(w*0.4, h*0.3);
                    this.ctx.lineTo(w*0.8, h*0.4);
                    this.ctx.stroke();
                }

                if (this.state === 'charging') {
                    const intensity = this.currentPhaseNum / 8;

                    const spawnRate = intensity * 6 + 1;
                    if (Math.random() * 2 < spawnRate) {
                        for(let k=0; k < Math.ceil(intensity * 4); k++) {
                            const angle = Math.random() * Math.PI * 2;
                            const dist = Math.max(w, h) * 0.8;
                            const startX = cx + Math.cos(angle) * dist;
                            const startY = cy + Math.sin(angle) * dist;
                            
                            let vx=0, vy=0;
                            if (this.theme === 'scifi') {
                                const speed = 15 + intensity * 20;
                                vx = -Math.cos(angle) * speed;
                                vy = -Math.sin(angle) * speed;
                            }
                            
                            this.particles.push({
                                x: startX, y: startY, lastX: startX, lastY: startY, vx, vy,
                                speed: 0.02 + intensity * 0.1, size: Math.random() * (2 + intensity * 5) + 1,
                                color: this.getRandomColor(), type: 'charge', life: 1, shape: this.theme === 'scifi' ? 'rect' : 'line'
                            });
                        }
                    }

                    if (this.theme === 'scifi') {
                        const ringCount = 3 + Math.floor(intensity * 3);
                        for(let i=0; i<ringCount; i++) {
                            this.ctx.beginPath();
                            const r = 40 + i*25 + intensity*40;
                            const offset = Date.now() / (1000 - i*150);
                            this.ctx.arc(cx, cy, r, offset % (Math.PI*2), (offset + Math.PI*(1 + intensity*0.5)) % (Math.PI*2));
                            this.ctx.strokeStyle = this.targetColors[0] || '#0ea5e9';
                            this.ctx.lineWidth = 2 + intensity*3;
                            this.ctx.stroke();
                        }
                    } else if (this.theme === 'celestial') {
                        const r = 50 + intensity * 80;
                        for(let i=0; i<3; i++) {
                            this.ctx.beginPath();
                            this.ctx.ellipse(cx, cy, r, r*0.3, (Date.now()/500) + (i*Math.PI/3), 0, Math.PI*2);
                            this.ctx.strokeStyle = this.targetColors[i%this.targetColors.length];
                            this.ctx.lineWidth = 3;
                            this.ctx.stroke();
                        }
                    } else if (this.theme === 'secret') {
                        // 炎のチャージサークル
                        const r = 40 + intensity * 90;
                        this.ctx.strokeStyle = '#ef4444';
                        this.ctx.lineWidth = 4;
                        this.ctx.beginPath();
                        this.ctx.arc(cx, cy, r, 0, Math.PI*2);
                        this.ctx.stroke();
                    } else {
                        const orbBaseRadius = 30 + intensity * 70;
                        const orbPulse = Math.sin(Date.now() / 80) * (intensity * 15);
                        const orbRadius = Math.max(10, orbBaseRadius + orbPulse);
                        const grad = this.ctx.createRadialGradient(cx, cy, 0, cx, cy, orbRadius * 2);
                        grad.addColorStop(0, '#ffffff');
                        grad.addColorStop(0.3, this.targetColors[0] || '#ffffff');
                        grad.addColorStop(1, 'transparent');
                        this.ctx.fillStyle = grad;
                        this.ctx.beginPath();
                        this.ctx.arc(cx, cy, orbRadius * 2, 0, Math.PI*2);
                        this.ctx.fill();
                    }
                }

                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.lastX = p.x; p.lastY = p.y; 

                    if (p.type === 'charge') {
                        if (this.theme === 'scifi') {
                            p.x += p.vx; p.y += p.vy;
                            p.vx *= 1.05; p.vy *= 1.05;
                        } else {
                            const dx = cx - p.x; const dy = cy - p.y;
                            p.x += dx * p.speed; p.y += dy * p.speed;
                            p.speed *= 1.08; 
                        }
                        if (Math.abs(cx - p.x) < 30 && Math.abs(cy - p.y) < 30) p.life = 0; 
                    } else if (p.type === 'explode' || p.type === 'shockwave') {
                        p.vx *= 0.94; p.vy *= 0.94;
                        if (p.type === 'explode') p.vy += 0.08; 
                        p.x += p.vx; p.y += p.vy;
                        p.life -= p.decay; p.size = Math.max(0, p.size - 0.05);
                    } else if (p.type === 'shell') {
                        // 物理シミュレーション薬莢
                        p.vy += 0.4; // 重力
                        p.x += p.vx;
                        p.y += p.vy;
                        p.life -= p.decay;
                        this.ctx.save();
                        this.ctx.translate(p.x, p.y);
                        this.ctx.rotate(p.life * 5);
                        this.ctx.fillStyle = p.color;
                        this.ctx.fillRect(-2, -5, 4, 10);
                        this.ctx.restore();
                        continue;
                    }

                    if (p.life > 0) {
                        this.ctx.globalAlpha = Math.max(0, p.life);
                        if (p.shape === 'rect') {
                            this.ctx.fillStyle = p.color;
                            this.ctx.fillRect(p.x - p.size, p.y - p.size, p.size*2, p.size*2);
                        } else {
                            this.ctx.beginPath();
                            this.ctx.moveTo(p.lastX, p.lastY);
                            this.ctx.lineTo(p.x, p.y);
                            this.ctx.strokeStyle = p.color;
                            this.ctx.lineWidth = p.size;
                            this.ctx.stroke();
                        }
                    } else {
                        this.particles.splice(i, 1);
                    }
                }
                
                this.ctx.globalAlpha = 1;
                this.ctx.restore();
            }
        }

        // --- カードコンポーネント ---
        const GachaCard = ({ item, isNew = false, size = 'large', index = 0, triggerReveal = false }) => {
            const IconComponent = getIconForName(item.itemName);
            const isLarge = size === 'large';
            const isSmall = size === 'small';
            
            const containerClasses = isLarge ? 'w-72 h-[420px] sm:w-80 sm:h-[480px] p-6' : 
                                    (isSmall ? 'w-36 h-48 sm:w-44 sm:h-60 p-3' : 'w-24 h-32 sm:w-32 sm:h-44 p-2'); 
            
            const textClasses = isLarge ? 'text-4xl' : (isSmall ? 'text-lg sm:text-xl' : 'text-sm sm:text-base');
            const iconWrapperClasses = isLarge ? 'w-40 h-40' : (isSmall ? 'w-16 h-16 sm:w-20 sm:h-20' : 'w-10 h-10 sm:w-14 sm:h-14');
            const iconSize = isLarge ? 100 : (isSmall ? 40 : 28);
            const nameClasses = isLarge ? 'text-xl sm:text-2xl px-2' : (isSmall ? 'text-xs sm:text-sm px-1' : 'text-[10px] sm:text-xs px-1 leading-tight line-clamp-2');

            // 10連ショットガンの時は時間差で撃ち込まれるアニメーションクラスを適用
            const animClass = triggerReveal ? 'animate-reveal-card-shotgun' : 'animate-reveal-card';

            return (
                <div 
                    className={`relative ${isLarge ? 'p-1.5' : 'p-0.5'} rounded-2xl ${item.bgClass} shadow-2xl transition-transform hover:scale-105 ${animClass}`}
                    style={{ animationDelay: triggerReveal ? `${index * 0.15}s` : `${index * 0.08}s` }}
                >
                    <div className={`bg-[#0f1219] rounded-[14px] flex flex-col items-center justify-between ${containerClasses} relative overflow-hidden shadow-inner`}>
                        <div className={`absolute inset-0 opacity-30 ${item.bgClass}`} style={{ filter: 'blur(30px)' }}></div>
                        {['SSR', 'HR', 'UR', 'Z', 'ZZR'].includes(item.id) && (
                            <div className="absolute inset-0 bg-gradient-to-tr from-transparent via-white to-transparent opacity-15 animate-[rainbow-bg-anim_2s_linear_infinite]" style={{ backgroundSize: '200% 200%' }} />
                        )}
                        {isNew && !isSmall && (
                            <div className="absolute top-2 left-2 sm:top-4 sm:left-4 bg-red-500 text-white text-[10px] sm:text-xs font-bold px-1.5 py-0.5 sm:px-2 sm:py-1 rounded-md animate-pulse z-20">
                                NEW!
                            </div>
                        )}
                        {isSmall && item.count > 1 && (
                            <div className="absolute top-1 right-1 bg-blue-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full z-20">
                                x{item.count}
                            </div>
                        )}

                        <div className={`w-full text-center font-black italic ${item.textClass} ${textClasses} z-10 drop-shadow-md`}>
                            {item.id}
                        </div>
                        <div className={`relative flex items-center justify-center ${iconWrapperClasses} z-10 my-1`}>
                            <div className={`absolute inset-0 rounded-full opacity-50 ${item.bgClass} blur-xl animate-pulse`}></div>
                            <IconComponent size={iconSize} color={item.colors[0]} className="relative z-10 drop-shadow-[0_0_10px_rgba(255,255,255,0.5)]" />
                        </div>
                        <div className="z-10 w-full text-center mb-1 sm:mb-2">
                            <div className={`text-white font-bold tracking-wide drop-shadow-lg break-words ${nameClasses}`}>
                                {item.itemName}
                            </div>
                            {isLarge && (
                                <div className="mt-2 text-xs text-gray-400 font-mono">
                                    Rarity Weight: {(item.weight/100).toFixed(1)}%
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- メインコンポーネント ---
        const App = () => {
            const [gameState, setGameState] = useState('idle'); // idle, charging, reveal_anim, reveal, collection
            const [currentBanner, setCurrentBanner] = useState(BANNERS[0]);
            const [animPhase, setAnimPhase] = useState(''); 
            const [animRarity, setAnimRarity] = useState(''); 
            const [currentResults, setCurrentResults] = useState([]);
            const [currentPhase, setCurrentPhase] = useState(1);
            const [isPhaseUpFlashing, setIsPhaseUpFlashing] = useState(false);
            const [isExplosionFlashing, setIsExplosionFlashing] = useState(false);
            const [collection, setCollection] = useState([]);
            const [showRates, setShowRates] = useState(false);
            const [isSecretUnlocked, setIsSecretUnlocked] = useState(false);
            const [showUnlockOverlay, setShowUnlockOverlay] = useState(false);
            
            const canvasRef = useRef(null);
            const particleSystem = useRef(null);
            const reqRef = useRef(null);
            const animFrameRef = useRef(null);

            const isHoldingRef = useRef(false);
            const isTenRollRef = useRef(false);
            const targetResultsRef = useRef([]); 
            const highestRarityRef = useRef(null); 
            const chargeProgressRef = useRef(0);
            const currentPhaseRef = useRef(1);

            useEffect(() => {
                const canvas = canvasRef.current;
                if(canvas && !particleSystem.current) {
                    particleSystem.current = new ParticleSystem(canvas, currentBanner.id);
                    const handleResize = () => {
                        particleSystem.current.resize(window.innerWidth, window.innerHeight);
                        particleSystem.current.initBg();
                    };
                    window.addEventListener('resize', handleResize);
                    handleResize();

                    const loop = () => {
                        if (particleSystem.current) particleSystem.current.update();
                        reqRef.current = requestAnimationFrame(loop);
                    };
                    loop();
                    return () => { window.removeEventListener('resize', handleResize); cancelAnimationFrame(reqRef.current); };
                }
            }, []);

            useEffect(() => {
                if(particleSystem.current && gameState === 'idle') {
                    particleSystem.current.setTheme(currentBanner.id);
                }
            }, [currentBanner]);

            useEffect(() => {
                if (gameState !== 'charging') return;
                let lastTime = performance.now();
                const chargeLoop = (time) => {
                    if (!isHoldingRef.current) return;
                    const dt = time - lastTime;
                    lastTime = time;

                    const chargeSpeed = isTenRollRef.current ? 0.18 : 0.12;
                    chargeProgressRef.current += dt * chargeSpeed; 
                    const targetPhase = highestRarityRef.current.phase;
                    const maxCharge = targetPhase * 100;
                    const expectedPhase = Math.floor(chargeProgressRef.current / 100) + 1;
                    
                    if (expectedPhase > currentPhaseRef.current && expectedPhase <= targetPhase) {
                        currentPhaseRef.current = expectedPhase;
                        setCurrentPhase(expectedPhase);
                        particleSystem.current.setChargeState(expectedPhase, currentBanner.rarities[expectedPhase-1].colors);
                        setIsPhaseUpFlashing(true);
                        setTimeout(() => setIsPhaseUpFlashing(false), 80);
                    }

                    if (chargeProgressRef.current >= maxCharge) { endCharge(); return; }
                    animFrameRef.current = requestAnimationFrame(chargeLoop);
                };
                animFrameRef.current = requestAnimationFrame(chargeLoop);
                return () => cancelAnimationFrame(animFrameRef.current);
            }, [gameState]);


            const startCharge = (isTen) => (e) => {
                if (e.type !== 'touchstart' && e.button !== 0) return; 
                if (gameState !== 'idle' && gameState !== 'reveal') return;
                
                isTenRollRef.current = isTen;
                const rollCount = isTen ? 10 : 1;
                let results = [];
                let highest = currentBanner.rarities[0];

                for(let i = 0; i < rollCount; i++) {
                    const totalWeight = currentBanner.rarities.reduce((sum, r) => sum + r.weight, 0);
                    let rand = Math.random() * totalWeight;
                    let targetRarity = currentBanner.rarities[0];
                    for (const r of currentBanner.rarities) {
                        if (rand < r.weight) { targetRarity = r; break; }
                        rand -= r.weight;
                    }
                    const itemName = generateItemName(targetRarity.id, currentBanner.data);
                    results.push({ 
                        ...targetRarity, itemName, uid: Math.random().toString(36).substr(2, 9), acquiredAt: new Date().getTime(), bannerId: currentBanner.id
                    });
                    if (targetRarity.phase > highest.phase) highest = targetRarity;
                }

                targetResultsRef.current = results;
                highestRarityRef.current = highest;

                isHoldingRef.current = true;
                chargeProgressRef.current = 0;
                currentPhaseRef.current = 1;
                
                setCurrentResults([]);
                setCurrentPhase(1);
                setAnimPhase('');
                setAnimRarity('');
                setGameState('charging');
                particleSystem.current.setChargeState(1, currentBanner.rarities[0].colors);
            };

            const endCharge = async () => {
                if (!isHoldingRef.current) return;
                isHoldingRef.current = false;
                cancelAnimationFrame(animFrameRef.current);

                const highest = highestRarityRef.current;
                const results = targetResultsRef.current;
                
                if (chargeProgressRef.current >= highest.phase * 100) await new Promise(resolve => setTimeout(resolve, 300));

                setGameState('reveal_anim');
                setAnimRarity(highest.id);

                // --- 星界の神託 ZZR 究極演出 ---
                if (highest.id === 'ZZR') {
                    setAnimPhase('glitch_white');
                    particleSystem.current.shake = 10;
                    await new Promise(resolve => setTimeout(resolve, 800));
                    
                    // 特異点（シンギュラリティ）への超吸引
                    setAnimPhase('singularity');
                    particleSystem.current.state = 'singularity';
                    for (let i = 1; i <= 30; i++) {
                        particleSystem.current.singularityPower = i * 0.1;
                        particleSystem.current.shake = i * 0.5;
                        await new Promise(r => setTimeout(r, 50));
                    }
                    
                    // ビッグバン（画面真っ白）
                    setAnimPhase('big_bang');
                    particleSystem.current.state = 'warp';
                    particleSystem.current.warpSpeed = 80;
                    particleSystem.current.shake = 100;
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    // 神の啓示テキスト
                    setAnimPhase('god_text');
                    particleSystem.current.warpSpeed = 2;
                    particleSystem.current.shake = 20;
                    await new Promise(resolve => setTimeout(resolve, 3000));

                    // 解放フラグ判定
                    if (!isSecretUnlocked) {
                        setIsSecretUnlocked(true);
                        setShowUnlockOverlay(true);
                    }
                } 
                // --- 隠しガチャ 10連専用ショットガン演出 ---
                else if (currentBanner.id === 'secret' && isTenRollRef.current) {
                    setAnimRarity('shotgun');
                    setAnimPhase('lock_load');
                    particleSystem.current.shake = 15;
                    await new Promise(resolve => setTimeout(resolve, 1200));

                    setAnimPhase('fire');
                    particleSystem.current.startShotgunExplosion();
                    await new Promise(resolve => setTimeout(resolve, 1800));
                }
                // --- 通常のZ演出 ---
                else if (highest.id === 'Z') {
                    setAnimPhase('darkout');
                    particleSystem.current.state = 'dark';
                    await new Promise(resolve => setTimeout(resolve, 1500));

                    setAnimPhase('crack');
                    particleSystem.current.state = 'crack';
                    particleSystem.current.shake = 30;
                    await new Promise(resolve => setTimeout(resolve, 1000));

                    setAnimPhase('zenith_text');
                    particleSystem.current.shake = 60;
                    await new Promise(resolve => setTimeout(resolve, 2000));
                }
                // --- 通常のUR演出 ---
                else if (highest.id === 'UR') {
                    particleSystem.current.state = 'ur_reveal';
                    if (currentBanner.id === 'scifi') {
                        setAnimPhase('warning');
                        particleSystem.current.shake = 30;
                        await new Promise(resolve => setTimeout(resolve, 1500));
                        setAnimPhase('glitch_red');
                        particleSystem.current.shake = 50;
                        const flashInt = setInterval(() => setIsExplosionFlashing(p => !p), 80);
                        await new Promise(resolve => setTimeout(resolve, 2000));
                        clearInterval(flashInt);
                        setIsExplosionFlashing(false);
                    } else if (currentBanner.id === 'secret') {
                        setAnimPhase('chamber_light');
                        particleSystem.current.shake = 15;
                        await new Promise(resolve => setTimeout(resolve, 1200));
                        setAnimPhase('bullet_focus');
                        particleSystem.current.shake = 40;
                        await new Promise(resolve => setTimeout(resolve, 2000));
                    } else {
                        setAnimPhase('focus');
                        particleSystem.current.shake = 10;
                        await new Promise(resolve => setTimeout(resolve, 1200));
                        setAnimPhase('awaken');
                        particleSystem.current.shake = 40;
                        await new Promise(resolve => setTimeout(resolve, 2500));
                    }
                }

                setIsExplosionFlashing(true);
                await new Promise(resolve => setTimeout(resolve, 150));
                
                // コレクション処理（重複加算）
                setCollection(prev => {
                    let newColl = [...prev];
                    results.forEach(res => {
                        const existing = newColl.find(item => item.itemName === res.itemName && item.bannerId === res.bannerId);
                        if (existing) {
                            existing.count = (existing.count || 1) + 1;
                            res.isDuplicate = true;
                        } else {
                            res.count = 1;
                            res.isDuplicate = false;
                            newColl.unshift(res);
                        }
                    });
                    return newColl;
                });

                setCurrentResults(results);
                // ショットガンの時はすでに結果用粒子が撃ち込まれているので追加爆発はさせない
                if (currentBanner.id !== 'secret' || !isTenRollRef.current) {
                    particleSystem.current.startExplosion(highest.colors, highest.id === 'Z', highest.id === 'UR', highest.id === 'ZZR');
                }
                setGameState('reveal');
                setIsExplosionFlashing(false);
            };

            const resetToIdle = () => {
                if (gameState === 'reveal') {
                    setGameState('idle');
                    setCurrentResults([]);
                    particleSystem.current.state = 'idle';
                    particleSystem.current.particles = [];
                    particleSystem.current.initBg();
                }
            };

            const allRarities = [...BASE_RARITIES, ZZR_RARITY].reverse();
            const groupedCollection = allRarities.map(rarity => ({ rarity, items: collection.filter(item => item.id === rarity.id) })); 

            // 表示するガチャバナーのフィルタ（隠しガチャ制限）
            const visibleBanners = BANNERS.filter(b => !b.isSecret || isSecretUnlocked);

            return (
                <div 
                    className={`relative w-full h-screen ${currentBanner.bgClass} overflow-hidden select-none font-sans transition-colors duration-1000`}
                    style={{ WebkitTouchCallout: 'none', WebkitUserSelect: 'none' }}
                    onMouseUp={gameState === 'charging' ? endCharge : undefined}
                    onTouchEnd={gameState === 'charging' ? endCharge : undefined}
                    onMouseLeave={gameState === 'charging' ? endCharge : undefined}
                    onClick={gameState === 'reveal' ? resetToIdle : undefined}
                >
                    <style>{`
                        /* Z用高クオリティレインボーテキスト */
                        .text-z-rare {
                            background: linear-gradient(90deg, #ff0055, #ffdd00, #00ff66, #00ffff, #0022ff, #9900ff, #ff0055);
                            background-size: 200% auto;
                            color: #fff;
                            -webkit-text-fill-color: transparent;
                            -webkit-background-clip: text;
                            background-clip: text;
                            animation: text-rainbow 1.8s linear infinite;
                            font-weight: 900;
                            filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
                        }
                        .bg-z-card {
                            background: #030308;
                            border: 2px solid #ff0077;
                            box-shadow: 0 0 30px #ff003c, 0 0 60px #00ff55, 0 0 90px #0055ff;
                            animation: rainbow-shadow 3s infinite linear;
                        }
                        @keyframes text-rainbow { to { background-position: 200% center; } }
                        @keyframes rainbow-shadow { 0%,100% { box-shadow: 0 0 30px #ff0055, 0 0 60px #ffdd00; } 33% { box-shadow: 0 0 30px #00ff66, 0 0 60px #00ffff; } 66% { box-shadow: 0 0 30px #9900ff, 0 0 60px #ff0055; } }

                        /* ZZR究極光輝カード */
                        .text-zzr-rare {
                            color: white;
                            text-shadow: 0 0 10px #fff, 0 0 25px #00ffff, 0 0 50px #8888ff, 0 0 100px #00ffff;
                            animation: pulse-zzr 1.5s infinite ease-in-out alternate;
                        }
                        .bg-zzr-card {
                            background: radial-gradient(circle, #252840, #000);
                            border: 2px solid #ffffff;
                            box-shadow: 0 0 50px #ffffff, inset 0 0 30px #00ffff;
                            animation: pulse-shadow-zzr 2s infinite alternate;
                        }
                        @keyframes pulse-zzr { 0% { opacity: 0.8; } 100% { opacity: 1; text-shadow: 0 0 15px #fff, 0 0 40px #00ffff, 0 0 80px #8888ff, 0 0 150px #00ffff; } }
                        @keyframes pulse-shadow-zzr { 0% { box-shadow: 0 0 30px #fff, inset 0 0 20px #00ffff; } 100% { box-shadow: 0 0 60px #8888ff, inset 0 0 40px #fff; } }

                        .card-container { perspective: 1200px; }
                        
                        @keyframes reveal-card { 0% { opacity: 0; transform: scale(0.5) translateY(50px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
                        .animate-reveal-card { opacity: 0; animation: reveal-card 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

                        /* ショットガン専用：撃ち込まれる叩きつけアニメーション */
                        @keyframes reveal-card-shotgun { 
                            0% { opacity: 0; transform: scale(3) translateZ(400px) rotate(15deg); filter: brightness(5); } 
                            40% { opacity: 1; transform: scale(0.95) translateZ(0) rotate(-5deg); filter: brightness(2); }
                            100% { opacity: 1; transform: scale(1) translateZ(0) rotate(0deg); filter: brightness(1); } 
                        }
                        .animate-reveal-card-shotgun { opacity: 0; animation: reveal-card-shotgun 0.35s cubic-bezier(0.11, 0, 0, 1) forwards; }

                        ::-webkit-scrollbar { width: 8px; }
                        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
                        ::-webkit-scrollbar-thumb { background: rgba(100,100,100,0.8); border-radius: 4px; }
                        ::-webkit-scrollbar-thumb:hover { background: rgba(150,150,150,0.8); }
                        
                        .charge-btn:active { transform: scale(0.95); box-shadow: 0 0 20px rgba(255,255,255,0.5); }

                        /* 各種カットイン演出アニメーション */
                        @keyframes expand-width { 0% { width: 2px; opacity: 0; } 50% { width: 60px; opacity: 1; box-shadow: 0 0 60px #fef08a; } 100% { width: 100vw; opacity: 0; } }
                        .glow-line { box-shadow: 0 0 20px #fef08a, 0 0 40px #fef08a; }
                        @keyframes scale-up-fade { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
                        @keyframes glitch-shake { 0% { transform: translate(0); } 20% { transform: translate(-8px, 5px); } 40% { transform: translate(8px, -5px); } 60% { transform: translate(-5px, -5px); } 80% { transform: translate(5px, 5px); } 100% { transform: translate(0); } }
                        
                        .glitch-text { position: relative; }
                        .glitch-text::before, .glitch-text::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: transparent; }
                        .glitch-text::before { left: 4px; text-shadow: -3px 0 red; clip: rect(24px, 1500px, 90px, 0); animation: glitch-anim-2 3s infinite linear alternate-reverse; }
                        .glitch-text::after { left: -4px; text-shadow: -3px 0 blue; clip: rect(85px, 1500px, 140px, 0); animation: glitch-anim 2.5s infinite linear alternate-reverse; }
                        @keyframes glitch-anim { 0% { clip: rect(10px, 9999px, 80px, 0); } 20% { clip: rect(80px, 9999px, 120px, 0); } 40% { clip: rect(10px, 9999px, 40px, 0); } 60% { clip: rect(60px, 9999px, 90px, 0); } 80% { clip: rect(100px, 9999px, 150px, 0); } 100% { clip: rect(20px, 9999px, 50px, 0); } }
                        @keyframes glitch-anim-2 { 0% { clip: rect(60px, 9999px, 100px, 0); } 20% { clip: rect(20px, 9999px, 60px, 0); } 40% { clip: rect(120px, 9999px, 150px, 0); } 60% { clip: rect(40px, 9999px, 80px, 0); } 80% { clip: rect(90px, 9999px, 120px, 0); } 100% { clip: rect(10px, 9999px, 30px, 0); } }

                        .glitch-white::before { text-shadow: -4px 0 #00ffff; animation: glitch-anim-2 0.3s infinite linear alternate-reverse; }
                        .glitch-white::after { text-shadow: 4px 0 #ff0055; animation: glitch-anim 0.3s infinite linear alternate-reverse; }

                        /* ショットガン演出用 */
                        @keyframes slide-in-bar { 0% { transform: scaleX(0); } 100% { transform: scaleX(1); } }
                        @keyframes gun-flash { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; filter: blur(5px); } }
                        .muzzle-flash {
                            background: radial-gradient(circle, #ffffff, #ffdd00 30%, #ff5500 60%, transparent);
                        }
                    `}</style>

                    <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-none" />
                    <div className={`absolute inset-0 bg-white z-50 pointer-events-none transition-opacity duration-75 ${isPhaseUpFlashing ? 'opacity-90' : 'opacity-0'}`} />
                    <div className={`absolute inset-0 bg-white z-50 pointer-events-none transition-opacity duration-150 ${isExplosionFlashing ? 'opacity-100' : 'opacity-0'}`} />

                    {/* --- 左上: ガチャ切り替えUI --- */}
                    {(gameState === 'idle' || gameState === 'collection') && !showRates && (
                        <div className="absolute top-4 left-4 sm:top-6 sm:left-6 z-40 flex flex-col gap-2">
                            <div className="text-xs text-gray-400 font-bold mb-1 pl-1">SELECT PROTOCOL</div>
                            <div className="flex gap-2 sm:gap-4 bg-black/50 p-1.5 sm:p-2 rounded-2xl backdrop-blur-md border border-gray-700 shadow-xl flex-wrap max-w-[85vw]">
                                {visibleBanners.map(banner => (
                                    <button key={banner.id} onClick={(e) => { e.stopPropagation(); setCurrentBanner(banner); setGameState('idle'); }}
                                        className={`px-3 sm:px-6 py-2 sm:py-3 rounded-xl font-black transition-all duration-300 text-xs sm:text-base whitespace-nowrap ${
                                            currentBanner.id === banner.id 
                                            ? (banner.id === 'secret' ? 'bg-red-600 text-white shadow-[0_0_20px_rgba(239,68,68,0.7)] scale-105' : 'bg-white text-black shadow-[0_0_15px_rgba(255,255,255,0.5)] scale-105')
                                            : 'text-gray-400 hover:text-white hover:bg-white/10'
                                        }`}
                                    >
                                        {banner.name}
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* --- 待機画面 UI --- */}
                    {gameState === 'idle' && !showRates && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center z-20">
                            <h1 className={`text-5xl md:text-8xl font-black tracking-widest mb-16 text-transparent bg-clip-text bg-gradient-to-b ${currentBanner.titleGradient} drop-shadow-[0_0_20px_rgba(255,255,255,0.3)] transition-all duration-500`}>
                                {currentBanner.name}
                            </h1>
                            <div className="flex flex-col sm:flex-row gap-6 sm:gap-8 mb-12">
                                <button onMouseDown={startCharge(false)} onTouchStart={startCharge(false)}
                                    className={`charge-btn px-10 sm:px-14 py-5 sm:py-6 text-xl sm:text-2xl font-bold rounded-2xl bg-gradient-to-br border-2 text-white shadow-lg transition-all duration-200 ${currentBanner.id === 'fantasy' ? 'from-gray-700 to-gray-900 border-gray-500' : (currentBanner.id === 'scifi' ? 'from-slate-800 to-cyan-950 border-cyan-800' : (currentBanner.id === 'secret' ? 'from-red-950 to-neutral-900 border-red-700' : 'from-indigo-950 to-purple-900 border-purple-500'))}`}
                                >
                                    <div className="text-sm text-gray-300 mb-1 font-mono">1 ROLL</div>
                                    長押しチャージ
                                </button>
                                <button onMouseDown={startCharge(true)} onTouchStart={startCharge(true)}
                                    className={`charge-btn px-12 sm:px-16 py-5 sm:py-6 text-2xl sm:text-3xl font-black rounded-2xl bg-gradient-to-br border-2 text-white transition-all duration-200 animate-pulse ${currentBanner.id === 'fantasy' ? 'from-indigo-600 via-purple-600 to-pink-600 border-pink-400 shadow-[0_0_30px_rgba(236,72,153,0.5)]' : (currentBanner.id === 'scifi' ? 'from-cyan-600 via-blue-600 to-indigo-700 border-cyan-300 shadow-[0_0_30px_rgba(6,182,212,0.5)]' : (currentBanner.id === 'secret' ? 'from-red-600 via-orange-600 to-amber-700 border-red-400 shadow-[0_0_30px_rgba(239,68,68,0.5)]' : 'from-purple-600 via-fuchsia-600 to-pink-500 border-fuchsia-300 shadow-[0_0_30px_rgba(217,70,239,0.5)]'))}`}
                                >
                                    <div className="text-sm text-white/80 mb-1 font-bold font-mono">10x MULTI ROLL</div>
                                    10連長押しチャージ
                                </button>
                            </div>
                            
                            <div className="flex gap-4">
                                <button onClick={(e) => { e.stopPropagation(); setGameState('collection'); }}
                                    className="px-6 py-3 text-lg font-semibold rounded-full border border-gray-600 text-gray-300 hover:bg-gray-800 hover:text-white transition-all flex items-center gap-2 backdrop-blur-md"
                                >
                                    <Book size={20} /> コレクション ({collection.length})
                                </button>
                                <button onClick={(e) => { e.stopPropagation(); setShowRates(true); }}
                                    className="px-6 py-3 text-lg font-semibold rounded-full border border-gray-600 text-gray-300 hover:bg-gray-800 hover:text-white transition-all flex items-center gap-2 backdrop-blur-md"
                                >
                                    <Star size={20} /> 提供割合
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- 確率表示モーダル --- */}
                    {showRates && (
                        <div className="absolute inset-0 bg-black/80 z-50 flex items-center justify-center p-4" onClick={() => setShowRates(false)}>
                            <div className="bg-[#0f1219] border border-gray-700 rounded-3xl p-6 sm:p-8 w-full max-w-md shadow-2xl" onClick={e => e.stopPropagation()}>
                                <h3 className="text-2xl font-black text-white mb-6 tracking-widest text-center border-b border-gray-700 pb-4">
                                    提供割合 <br/><span className="text-sm font-normal text-gray-400">{currentBanner.name}</span>
                                </h3>
                                <div className="space-y-3 max-h-[50vh] overflow-y-auto pr-2">
                                    {currentBanner.rarities.map(r => {
                                        const totalW = currentBanner.rarities.reduce((a,b)=>a+b.weight,0);
                                        const rate = (r.weight / totalW * 100).toFixed(3);
                                        return (
                                            <div key={r.id} className="flex justify-between items-center bg-black/50 p-3 rounded-xl border border-gray-800">
                                                <span className={`font-black italic text-xl ${r.textClass.split(' ')[0]}`}>{r.id}</span>
                                                <span className="text-gray-200 font-mono text-lg">{rate}%</span>
                                            </div>
                                        );
                                    })}
                                </div>
                                <button onClick={() => setShowRates(false)} className="mt-8 w-full py-4 bg-gray-800 text-white rounded-2xl font-bold hover:bg-gray-700 transition-colors">
                                    閉じる
                                </button>
                            </div>
                        </div>
                    )}

                    {/* --- チャージ中演出 UI --- */}
                    {gameState === 'charging' && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center z-30 pointer-events-none pb-20">
                            <div className="text-2xl text-white font-bold tracking-[0.3em] mb-2 opacity-60 font-mono">
                                {isTenRollRef.current ? "MULTI_RESONATING..." : "RESONATING..."}
                            </div>
                            <div className={`text-7xl md:text-[120px] font-black italic transition-colors duration-100 ${currentBanner.rarities[currentPhase-1].textClass} drop-shadow-[0_0_30px_rgba(255,255,255,0.6)]`}>
                                PHASE {currentPhase}
                            </div>
                        </div>
                    )}

                    {/* --- 特殊演出・カットインシステム --- */}
                    {gameState === 'reveal_anim' && (
                        <div className="absolute inset-0 z-40 flex flex-col items-center justify-center overflow-hidden pointer-events-none">
                            
                            {/* === [究極] ZZR 演出 === */}
                            {animRarity === 'ZZR' && (
                                <>
                                    {animPhase === 'glitch_white' && (
                                        <div className="absolute inset-0 bg-white z-10 flex items-center justify-center animate-[glitch-shake_0.1s_infinite]">
                                            <h1 className="text-7xl md:text-9xl font-black text-black glitch-text glitch-white" data-text="SYSTEM CRITICAL">SYSTEM CRITICAL</h1>
                                        </div>
                                    )}
                                    {animPhase === 'singularity' && (
                                        <div className="absolute inset-0 bg-black z-0 flex items-center justify-center" />
                                    )}
                                    {animPhase === 'big_bang' && (
                                        <div className="absolute inset-0 bg-white z-50 flex items-center justify-center" />
                                    )}
                                    {animPhase === 'god_text' && (
                                        <>
                                            <div className="absolute inset-0 bg-gradient-to-tr from-indigo-950 via-black to-fuchsia-950 opacity-90 z-0" />
                                            <div className="flex flex-col items-center z-20">
                                                <div className="text-transparent bg-clip-text bg-gradient-to-b from-white via-cyan-100 to-cyan-500 text-6xl md:text-[140px] font-black tracking-[0.3em] font-sans text-center leading-none"
                                                     style={{ filter: 'drop-shadow(0 0 45px rgba(255,255,255,0.7))', animation: 'scale-up-fade 0.8s cubic-bezier(0.1, 0.9, 0.2, 1) forwards' }}>
                                                    ZETA DECREE
                                                </div>
                                                <div className="text-cyan-400 tracking-[0.6em] text-xs md:text-sm mt-4 font-mono animate-pulse opacity-70">
                                                    CREATION OVERRIDE SUCCESSFUL
                                                </div>
                                            </div>
                                        </>
                                    )}
                                </>
                            )}

                            {/* === [確定] Z 演出 === */}
                            {animRarity === 'Z' && (
                                <>
                                    {animPhase === 'darkout' && ( <div className="absolute inset-0 bg-black z-10" /> )}
                                    {animPhase === 'crack' && ( <div className="absolute inset-0 bg-black z-10" /> )}
                                    {animPhase === 'zenith_text' && (
                                        <>
                                            <div className="absolute inset-0 bg-rainbow animate-rainbow-bg opacity-30 z-0" />
                                            <div className="text-z-rare text-6xl md:text-[120px] font-black tracking-[0.1em] z-20"
                                                 style={{ animation: 'scale-up-fade 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards' }}>
                                                ZENITH AWAKENED
                                            </div>
                                        </>
                                    )}
                                </>
                            )}

                            {/* === [確定] UR 演出 === */}
                            {animRarity === 'UR' && (
                                <>
                                    {currentBanner.id === 'fantasy' && (
                                        <>
                                            {animPhase === 'focus' && (
                                                <div className="absolute inset-0 flex items-center justify-center bg-black/80">
                                                    <div className="w-[2px] h-screen bg-yellow-200 animate-[expand-width_1s_ease-out_forwards] glow-line" />
                                                </div>
                                            )}
                                            {animPhase === 'awaken' && (
                                                <div className="absolute inset-0 flex items-center justify-center bg-white/10 backdrop-blur-[2px]">
                                                    <div className="absolute w-[300px] h-[300px] sm:w-[500px] sm:h-[500px] border-[2px] border-yellow-300/40 rounded-full border-dashed animate-[spin_10s_linear_infinite]" />
                                                    <h1 className="text-5xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-yellow-100 to-yellow-500 tracking-[0.4em] z-10" 
                                                        style={{ filter: 'drop-shadow(0 0 30px rgba(250,204,21,0.8))', animation: 'scale-up-fade 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards' }}>
                                                        AWAKENING
                                                    </h1>
                                                </div>
                                            )}
                                        </>
                                    )}
                                    {currentBanner.id === 'scifi' && (
                                        <>
                                            {animPhase === 'warning' && (
                                                <div className="absolute inset-0 bg-red-950/90 flex flex-col justify-center">
                                                    <div className="w-full h-48 bg-red-600/20 border-y-4 border-red-500 flex items-center justify-center relative overflow-hidden animate-pulse">
                                                        <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, #ef4444 10px, #ef4444 20px)' }} />
                                                        <div className="text-red-500 text-6xl md:text-9xl font-black tracking-[0.2em] font-mono opacity-90 z-10" style={{ textShadow: '0 0 30px red' }}>
                                                            WARNING
                                                        </div>
                                                    </div>
                                                </div>
                                            )}
                                            {animPhase === 'glitch_red' && (
                                                <div className="absolute inset-0 flex items-center justify-center bg-black/95">
                                                    <h1 className="text-5xl md:text-8xl font-black text-cyan-300 tracking-[0.1em] z-10 glitch-text font-mono" data-text="SYSTEM OVERRIDE">
                                                        SYSTEM OVERRIDE
                                                    </h1>
                                                </div>
                                            )}
                                        </>
                                    )}
                                    {currentBanner.id === 'secret' && (
                                        <>
                                            {animPhase === 'chamber_light' && (
                                                <div className="absolute inset-0 bg-black/90 flex items-center justify-center">
                                                    <div className="w-1 h-32 bg-red-600 animate-[slide-in-bar_0.8s_ease-out_forwards]" />
                                                </div>
                                            )}
                                            {animPhase === 'bullet_focus' && (
                                                <div className="absolute inset-0 bg-[#120303]/90 flex items-center justify-center">
                                                    <h1 className="text-5xl md:text-8xl font-black text-red-500 tracking-[0.3em] font-mono"
                                                        style={{ filter: 'drop-shadow(0 0 30px red)', animation: 'scale-up-fade 0.5s ease-out forwards' }}>
                                                        LETHAL LOAD
                                                    </h1>
                                                </div>
                                            )}
                                        </>
                                    )}
                                </>
                            )}

                            {/* === [隠しガチャ 10連専用] ショットガン銃撃演出 === */}
                            {animRarity === 'shotgun' && (
                                <>
                                    {animPhase === 'lock_load' && (
                                        <div className="absolute inset-0 bg-black z-10 flex flex-col items-center justify-center">
                                            <div className="text-white font-mono tracking-[0.5em] text-lg sm:text-2xl animate-pulse text-red-500">
                                                LOCK & LOAD
                                            </div>
                                            <div className="w-64 h-1.5 bg-neutral-900 border border-neutral-700 mt-4 overflow-hidden rounded-full">
                                                <div className="h-full bg-red-600 animate-[slide-in-bar_1.1s_linear_forwards]" />
                                            </div>
                                        </div>
                                    )}
                                    {animPhase === 'fire' && (
                                        <div className="absolute inset-0 bg-black/90 z-10 flex items-center justify-center">
                                            {/* マズルフラッシュの大爆発 */}
                                            <div className="absolute w-[200px] h-[200px] md:w-[400px] md:h-[400px] rounded-full muzzle-flash animate-[gun-flash_0.6s_ease-out_forwards] z-20" />
                                            <div className="absolute text-white font-black italic text-6xl md:text-9xl tracking-tighter drop-shadow-[0_0_35px_rgba(239,68,68,1)] z-30">
                                                FIRE !!
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    )}

                    {/* --- 結果画面UI --- */}
                    {gameState === 'reveal' && currentResults.length > 0 && (
                        <div className="absolute inset-0 flex flex-col items-center justify-center z-20 card-container">
                            {currentResults.length === 1 ? (
                                <div className="mb-8">
                                    <GachaCard item={currentResults[0]} isNew={!currentResults[0].isDuplicate} size="large" />
                                </div>
                            ) : (
                                <div className="grid grid-cols-5 gap-2 sm:gap-4 md:gap-6 mb-8 px-4 max-w-6xl">
                                    {currentResults.map((item, idx) => (
                                        <GachaCard 
                                            key={item.uid} 
                                            item={item} 
                                            isNew={!item.isDuplicate} 
                                            size="tiny" 
                                            index={idx} 
                                            triggerReveal={currentBanner.id === 'secret'} // ショットガンは独自の叩きつけアニメーション
                                        />
                                    ))}
                                </div>
                            )}
                            <div className="text-gray-300 text-sm sm:text-lg animate-pulse font-mono bg-black/60 px-8 py-3 rounded-full backdrop-blur-md pointer-events-none mt-4 border border-gray-700">
                                CLICK TO CONTINUE
                            </div>
                        </div>
                    )}

                    {/* --- コレクション画面UI --- */}
                    {gameState === 'collection' && (
                        <div className="absolute inset-0 bg-[#0a0a0f] z-40 flex flex-col overflow-hidden">
                            <div className="p-4 sm:p-6 border-b border-gray-800 flex justify-between items-center bg-black/80 backdrop-blur-xl z-10 mt-16 sm:mt-0">
                                <h2 className="text-2xl md:text-3xl font-black text-white tracking-[0.2em] flex items-center gap-4 font-mono">
                                    <Book size={32} className="text-cyan-400" /> ARCHIVE
                                </h2>
                                <div className="flex items-center gap-4 md:gap-8">
                                    <div className="text-gray-400 font-mono hidden md:block">
                                        UNIQUE_ENTRIES: <span className="text-white font-bold text-xl">{collection.length}</span>
                                    </div>
                                    <button onClick={() => setGameState('idle')}
                                        className="px-8 py-2 border border-gray-600 hover:bg-white hover:text-black text-white rounded-full font-bold transition-all"
                                    >
                                        RETURN
                                    </button>
                                </div>
                            </div>

                            <div className="flex-1 overflow-y-auto p-4 md:p-8 bg-black/40">
                                {collection.length === 0 ? (
                                    <div className="w-full h-full flex flex-col items-center justify-center text-gray-700 font-mono">
                                        <Ghost size={100} className="mb-6 opacity-30" />
                                        <p className="text-3xl font-bold tracking-widest">NO DATA FOUND</p>
                                    </div>
                                ) : (
                                    <div className="max-w-7xl mx-auto pb-20">
                                        {groupedCollection.map(group => {
                                            if (group.items.length === 0) return null;
                                            return (
                                                <div key={group.rarity.id} className="mb-14">
                                                    <div className="flex items-end gap-4 border-b border-gray-700/50 pb-3 mb-8">
                                                        <h3 className={`text-4xl font-black italic ${group.rarity.textClass}`}>
                                                            {group.rarity.id}
                                                        </h3>
                                                        <span className="text-gray-500 font-bold mb-1 font-mono">
                                                            // {group.rarity.name} [QTY: {group.items.length}]
                                                        </span>
                                                    </div>
                                                    
                                                    <div className="flex flex-wrap gap-4 md:gap-8">
                                                        {group.items.map((item) => (
                                                            <div key={item.uid} className="transition-transform hover:-translate-y-3 cursor-pointer group relative">
                                                                <GachaCard item={item} size="small" />
                                                                <div className="absolute -top-3 -right-3 bg-[#0a0a0f] text-gray-300 text-[10px] px-3 py-1 rounded-full border border-gray-600 shadow-xl font-mono">
                                                                    {BANNERS.find(b => b.id === item.bannerId)?.name || 'Unknown'}
                                                                </div>
                                                                <div className="mt-3 text-center text-xs text-gray-600 opacity-0 group-hover:opacity-100 transition-opacity font-mono">
                                                                    {new Date(item.acquiredAt).toLocaleTimeString()}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* --- ZZR当選・隠しガチャ解放モーダル --- */}
                    {showUnlockOverlay && (
                        <div className="absolute inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-4">
                            <div className="absolute w-[200%] h-[200%] bg-[radial-gradient(circle,rgba(239,68,68,0.15),transparent)] animate-pulse" />
                            <div className="z-10 flex flex-col items-center max-w-lg text-center animate-[scale-up-fade_1s_cubic-bezier(0.1,1,0.1,1)_forwards]">
                                <Bomb size={120} className="text-red-500 mb-8 animate-bounce" />
                                <h1 className="text-4xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-orange-500 tracking-wider mb-4 font-sans">
                                    TRIGGER UNLOCKED
                                </h1>
                                <p className="text-white text-lg font-bold mb-8 leading-relaxed">
                                    ZZRの獲得を検知。世界の境界が破られました。<br/>
                                    隠しプロトコル「終末のトリガー」が恒久的に解放されます。
                                </p>
                                <button onClick={() => setShowUnlockOverlay(false)}
                                    className="px-12 py-4 bg-red-600 text-white text-xl font-black rounded-full shadow-[0_0_30px_rgba(239,68,68,0.5)] hover:shadow-[0_0_50px_rgba(239,68,68,1)] hover:scale-105 transition-all duration-300"
                                >
                                    兵器庫へアクセスする
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
